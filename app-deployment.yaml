apiVersion: apps/v1
kind: Deployment
metadata:
  name: poke-app
  labels:
    app: poke-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poke-app
  template:
    metadata:
      labels:
        app: poke-app
    spec:
      containers:
      # 容器 1：Vue 前端網頁
      - name: vue-frontend
        image: beibei860429/vue-pokemon:latest # 換成你的 Image
        ports:
        - containerPort: 80
      
      # 容器 2：Spring Boot 後端
      - name: springboot-backend
        image: beibei860429/springboot-api:latest # 換成你的 Image
        ports:
        - containerPort: 8080
        env:
          - name: APP_CORS_ALLOWED_ORIGINS
            value: "http://beibei860429.duckdns.org:30080" #  允許 DuckDNS 外網網址跨域連線
---
apiVersion: v1
kind: Service
metadata:
  name: poke-service
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8081
    targetPort: 80
    nodePort: 30080 # 鎖定實體外網門牌為 30080
  selector:
    app: poke-app